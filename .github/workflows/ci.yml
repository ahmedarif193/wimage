name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y wimtools libssl-dev

    - name: Build with CMake
      run: |
        cmake -B build -DENABLE_TESTS=ON \
          -DCMAKE_C_FLAGS="-D_FILE_OFFSET_BITS=64"
        cmake --build build -j$(nproc)

    - name: Unit tests
      working-directory: build
      run: ./wimage_tests

    - name: Integration tests
      run: WIMAGE_BIN=$PWD/build/wimage python3 scripts/test_compare.py
